<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Специално за теб!</title>
    <base href="/Invite/" />    
    <link rel="stylesheet" href="css/app.css" />
    <link href="BlazorApp5.styles.css" rel="stylesheet" /> 
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
   
    .sidebar {
        display: none !important;
    }

    
    .top-row {
        display: none !important;
    }

  
    .page {
        display: block !important;
    }

    main {
        width: 100% !important;
    }

    .content {
        padding: 0 !important;
    }
</style>
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Възникна грешка.
        <a href="" class="reload">Обнови</a>
        <a class="dismiss">🗙</a>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/bg.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
 
    <script type="text/javascript">
        (function () {
            emailjs.init("uUmkgAM-18oPPb9dQ");
        })();
        window.sendEmail = (message) => {
            console.log("Изпращане на покана...");
            return emailjs.send("service_7q3r4qf", "template_erho0dg", {
                message: message,
                to_name: "Божо"
            }).then(function (response) {
                console.log("Успешно изпратено!", response.status);
                return true;
            }, function (error) {
                console.error("Грешка при EmailJS:", error);
                return false;
            });
        };
    </script>

    <script src="_framework/blazor.webassembly.zxhwjtv6sc.js"></script>
</body>

</html>
